# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false

      # Set up a matrix to run the following 4 configurations:
      # 1. <ubuntu-latest, Release, GCC  toolchain, default generator>
      # 2. <ubuntu-latest, Release, Clang toolchain, default generator>
      # 3. <ubuntu-22.04,  Release, GCC  toolchain, default generator>
      # 4. <ubuntu-22.04,  Release, Clang toolchain, default generator>
      #
      # To add more build types (Release, Debug, RelWithDebInfo, etc.) customize the build_type list.
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]
        build_type: [Release]
        c_compiler: [gcc, clang]
        cpp_compiler: [g++, clang++]
        include:
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-22.04
            c_compiler: gcc
            cpp_compiler: g++
        exclude:
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
          - os: ubuntu-22.04
            c_compiler: clang
            cpp_compiler: clang++

    steps:
    - uses: actions/checkout@v4

    - name: Set reusable strings
      # Turn repeated input strings (such as the build output directory) into step outputs. These step outputs can be used throughout the workflow file.
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}

    - name: Build
      # Build your program with the given configuration. Note that --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      # Execute tests defined by the CMake configuration. Note that --build-config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
      run: ctest --build-config ${{ matrix.build_type }}

  # ---------------------------------------------------------------------------
  # Documentation drift guard
  #
  # Runs tools/docs-audit.sh --strict to catch doc/code drift BEFORE merge.
  # Uses --strict so warnings also fail the check (not just hard failures).
  # Reference: docs/02_architecture/post-refactor-architecture.md
  # ---------------------------------------------------------------------------
  docs-audit:
    name: Documentation Audit (--strict)
    runs-on: ubuntu-latest
    # Required for all PRs and main pushes, regardless of which paths changed —
    # drift can be introduced by code-only commits too.
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Required: docs-audit §6.2 verifies `external/TaskRunner/plans/sync-plan.md`
        # exists in the submodule HEAD. Without submodules: true the audit fails
        # on every PR (submodule dir is empty in CI even when pointer is correct).
        # Fixed in PR #20 (commit will follow).
        with:
          submodules: true

      - name: Run docs-audit
        # Pure bash + grep/find — no extra dependencies needed.
        # --strict: warnings count as failures (any unchecked drift blocks merge).
        run: bash tools/docs-audit.sh --strict

      - name: Annotate failure with bypass instructions
        if: failure()
        run: |
          echo "::error::docs-audit --strict failed. Review the report above."
          echo "::error::To run locally: bash tools/docs-audit.sh --strict"
          echo "::error::To update the SSOT: docs/02_architecture/post-refactor-architecture.md"
          echo "::error::Bypass only if the failure is a known false positive; document the reason in the PR."

  # ===== Sanitizer jobs (change: 2026-07-16-three-sanitizer-infra) =====
  # Required: ASan + UBSan + TSan must all pass; configure as required
  # status checks in GitHub repository settings.
  sanitizer:
    name: Sanitizer — ${{ matrix.name }}
    runs-on: ubuntu-latest
    env:
      CC: ${{ matrix.compiler == 'clang' && 'clang' || 'gcc' }}
      CXX: ${{ matrix.compiler == 'clang' && 'clang++' || 'g++' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "ASan (Debug, GCC)"
            sanitizer: asan
            cmake_flag: "ENABLE_ASAN=ON"
            compiler: gcc
            env_var: "ASAN_OPTIONS"
            env_value: "detect_leaks=0:halt_on_error=1:abort_on_error=1:print_stacktrace=1"
            grep_pattern: "ERROR: AddressSanitizer"
            ctest_exclude: "perf"
          - name: "UBSan (Debug, GCC)"
            sanitizer: ubsan
            cmake_flag: "ENABLE_UBSAN=ON"
            compiler: gcc
            env_var: "UBSAN_OPTIONS"
            env_value: "print_stacktrace=1"
            grep_pattern: "^[^:]+:[0-9]+:[0-9]+: runtime error:"
            ctest_exclude: "perf"
          - name: "TSan (Debug, Clang)"
            sanitizer: tsan
            cmake_flag: "ENABLE_TSAN=ON"
            compiler: clang
            env_var: "TSAN_OPTIONS"
            env_value: "report_signal_unsafe=0"
            grep_pattern: "WARNING: ThreadSanitizer: data race"
            ctest_exclude: "perf|test_hal_thread_safety_standalone"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Clang toolchain
        if: matrix.compiler == 'clang'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang lld

      - name: Configure sanitizer
        run: cmake -B build-${{ matrix.sanitizer }} -D${{ matrix.cmake_flag }} -DCMAKE_BUILD_TYPE=Debug -S ${{ github.workspace }}

      - name: Build sanitizer
        run: cmake --build build-${{ matrix.sanitizer }} -j2

      - name: Test sanitizer
        working-directory: ${{ github.workspace }}
        env:
          ${{ matrix.env_var }}: ${{ matrix.env_value }}
        run: |
          scripts/stage-plugin.sh build-${{ matrix.sanitizer }}
          ctest --test-dir build-${{ matrix.sanitizer }} --output-on-failure --exclude-regex "${{ matrix.ctest_exclude }}" 2>&1 | tee build-${{ matrix.sanitizer }}/${{ matrix.sanitizer }}-ctest.log

      - name: Check sanitizer report
        if: success()
        run: |
          if grep -qiE '${{ matrix.grep_pattern }}' build-${{ matrix.sanitizer }}/${{ matrix.sanitizer }}-ctest.log; then
            echo "::error::${{ matrix.sanitizer }} errors detected in ctest log"
            exit 1
          fi

      - name: Upload artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.sanitizer }}-artifacts
          path: |
            build-${{ matrix.sanitizer }}/${{ matrix.sanitizer }}-ctest.log
            plugins/plugin_gpu_driver.so
